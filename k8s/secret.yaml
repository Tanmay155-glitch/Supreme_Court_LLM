apiVersion: v1
kind: Secret
metadata:
  name: uli-secrets
  namespace: uli-system
type: Opaque
# Values are base64-encoded placeholders — replace before deploying
data:
  # echo -n "your-pem-key" | base64
  NJDG_PRIVATE_KEY:  CHANGEME_BASE64_ENCODED_PEM
  # echo -n "sk-..." | base64
  OPENAI_API_KEY:    CHANGEME_BASE64_ENCODED
  # echo -n "postgresql+asyncpg://..." | base64
  DB_URL:            CHANGEME_BASE64_ENCODED
  # echo -n "pc-..." | base64
  PINECONE_API_KEY:  CHANGEME_BASE64_ENCODED
  # echo -n "redis://..." | base64
  REDIS_URL:         CHANGEME_BASE64_ENCODED
